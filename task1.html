<body>
    <script>
        //first method 
        //firstly we create a function prompt that takes a input from the user.
        let number1 = Number(prompt("enter numbner"));
        //after this we will check the condition when user enters a number if its is even 
        //it will print even number and not continue to else condition.
                if (number1 % 2 == 0){
                    //this will check the condition every time
                    console.log(number1 + " even " + " through modules ");
                    // prints the condition and print the value
                }
                // if the if condition will fail than it will print the else condition
                else{
                    console.log(number1 + " odd " + " through modules ");
                }      
    </script>
